stages:
  - test
  - validate
  - plan
  - deploy

variables:
  TF_ROOT: infra/terraform/environments/dev
  AWS_DEFAULT_REGION: eu-west-1

python:test:
  stage: test
  image: python:3.12-slim

  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt

  script:
    - python -m py_compile src/api/handler.py
    - python -m pytest -v

terraform:fmt:
  stage: validate
  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]
  script:
    - terraform -chdir=$TF_ROOT fmt -check

terraform:validate:
  stage: validate
  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]
  script:
    - terraform -chdir=$TF_ROOT init -backend=false
    - terraform -chdir=$TF_ROOT validate

terraform:plan:
  stage: plan
  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]
  rules:
    - when: manual
  script:
    - terraform -chdir=$TF_ROOT init
    - terraform -chdir=$TF_ROOT plan

frontend:deploy:
  stage: deploy
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com
  rules:
    - when: manual
  script:
    - test -n "$INCIDENTOPS_API_URL"
    - test -n "$SITE_BUCKET_NAME"
    - test -n "$CLOUDFRONT_DISTRIBUTION_ID"
    - |
      if [ -n "$AWS_ROLE_ARN" ]; then
        aws_sts_output=$(aws sts assume-role-with-web-identity --role-arn "$AWS_ROLE_ARN" --role-session-name "GitLabRunner-${CI_PROJECT_ID}-${CI_PIPELINE_ID}" --web-identity-token "$GITLAB_OIDC_TOKEN" --duration-seconds 3600 --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text)
        export AWS_ACCESS_KEY_ID=$(echo "$aws_sts_output" | awk '{print $1}')
        export AWS_SECRET_ACCESS_KEY=$(echo "$aws_sts_output" | awk '{print $2}')
        export AWS_SESSION_TOKEN=$(echo "$aws_sts_output" | awk '{print $3}')
      fi
    - aws sts get-caller-identity
    - sed "s|__INCIDENTOPS_API_URL__|$INCIDENTOPS_API_URL|g" frontend/config.template.js > frontend/config.js
    - aws s3 sync frontend/ s3://$SITE_BUCKET_NAME --delete --exclude "config.template.js"
    - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"
