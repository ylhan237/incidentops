stages:
  - test
  - validate
  - plan
  - deploy
  - destroy

variables:
  TF_ROOT: "infra/terraform/environments/dev"
  TF_STATE_NAME: "incidentops-dev"

  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

  AWS_REGION: "eu-west-1"
  AWS_DEFAULT_REGION: "eu-west-1"

python:test:
  stage: test
  image: python:3.12-slim

  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt

  script:
    - python -m py_compile src/api/handler.py
    - python -m pytest -v

terraform:fmt:
  stage: validate

  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]

  script:
    - terraform -chdir="$TF_ROOT" fmt -check

terraform:validate:
  stage: validate

  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]

  script:
    - terraform -chdir="$TF_ROOT" init -backend=false
    - terraform -chdir="$TF_ROOT" validate

terraform:plan:
  stage: plan

  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]

  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - when: never

  script:
  - |
    set -eu
    apk add --no-cache unzip
    export TF_HTTP_ADDRESS="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}"
    export TF_HTTP_LOCK_ADDRESS="${TF_HTTP_ADDRESS}/lock"
    export TF_HTTP_UNLOCK_ADDRESS="${TF_HTTP_ADDRESS}/lock"
    export TF_HTTP_USERNAME="gitlab-ci-token"
    export TF_HTTP_PASSWORD="${CI_JOB_TOKEN}"
    export TF_HTTP_LOCK_METHOD="POST"
    export TF_HTTP_UNLOCK_METHOD="DELETE"
    export TF_HTTP_RETRY_WAIT_MIN="5"

    export AWS_ROLE_ARN="${AWS_PLAN_ROLE_ARN}"
    export AWS_ROLE_SESSION_NAME="GitLab-Plan-${CI_PROJECT_ID}-${CI_PIPELINE_ID}"
    printf '%s' "${GITLAB_OIDC_TOKEN}" > /tmp/gitlab-oidc-token
    export AWS_WEB_IDENTITY_TOKEN_FILE="/tmp/gitlab-oidc-token"

    rm -f "${TF_ROOT}/api.zip"

    terraform -chdir="${TF_ROOT}" init -reconfigure
    terraform -chdir="${TF_ROOT}" plan -out=tfplan
    terraform -chdir="${TF_ROOT}" show -no-color tfplan > "${TF_ROOT}/tfplan.txt"

    test -f "${TF_ROOT}/api.zip"

    unzip -l "${TF_ROOT}/api.zip"
    unzip -p "${TF_ROOT}/api.zip" handler.py |
      grep -E "Processing request|Unhandled error"

  artifacts:
    paths:
      - "$TF_ROOT/tfplan"
      - "$TF_ROOT/tfplan.txt"
      - "$TF_ROOT/api.zip"
    expire_in: 1 day

terraform:apply:
  stage: deploy

  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]

  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com

  needs:
    - job: terraform:plan
      artifacts: true

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never

  resource_group: incidentops-dev
  interruptible: false

  script:
    - |
      set -eu
      apk add --no-cache unzip
      test -n "${CI_JOB_TOKEN:-}" ||
        { echo "CI_JOB_TOKEN is missing"; exit 1; }

      test -n "${AWS_DEPLOY_ROLE_ARN:-}" ||
        { echo "AWS_DEPLOY_ROLE_ARN is missing"; exit 1; }

      test -n "${GITLAB_OIDC_TOKEN:-}" ||
        { echo "GITLAB_OIDC_TOKEN is missing"; exit 1; }

      # Le job apply utilise SON PROPRE CI_JOB_TOKEN.
      export TF_HTTP_ADDRESS="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}"
      export TF_HTTP_LOCK_ADDRESS="${TF_HTTP_ADDRESS}/lock"
      export TF_HTTP_UNLOCK_ADDRESS="${TF_HTTP_ADDRESS}/lock"
      export TF_HTTP_USERNAME="gitlab-ci-token"
      export TF_HTTP_PASSWORD="${CI_JOB_TOKEN}"
      export TF_HTTP_LOCK_METHOD="POST"
      export TF_HTTP_UNLOCK_METHOD="DELETE"
      export TF_HTTP_RETRY_WAIT_MIN="5"

      # Authentification AWS avec le rôle de déploiement.
      export AWS_ROLE_ARN="${AWS_DEPLOY_ROLE_ARN}"
      export AWS_ROLE_SESSION_NAME="GitLab-Apply-${CI_PROJECT_ID}-${CI_PIPELINE_ID}"
      printf '%s' "${GITLAB_OIDC_TOKEN}" > /tmp/gitlab-oidc-token
      export AWS_WEB_IDENTITY_TOKEN_FILE="/tmp/gitlab-oidc-token"

      echo "State utilisé : ${TF_STATE_NAME}"
      echo "Rôle AWS utilisé : ${AWS_ROLE_ARN}"

      test -f "${TF_ROOT}/tfplan" ||
        { echo "Terraform plan artifact is missing"; exit 1; }
      test -f "$TF_ROOT/api.zip"
      unzip -p "$TF_ROOT/api.zip" handler.py | grep -E "Processing request|Unhandled error"
      terraform -chdir="${TF_ROOT}" init -reconfigure
      terraform -chdir="${TF_ROOT}" apply tfplan

frontend:deploy:
  stage: deploy

  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]

  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never

  script:
    - |
      set -eu

      test -n "${AWS_DEPLOY_ROLE_ARN:-}" ||
        { echo "AWS_DEPLOY_ROLE_ARN is missing"; exit 1; }

      test -n "${GITLAB_OIDC_TOKEN:-}" ||
        { echo "GITLAB_OIDC_TOKEN is missing"; exit 1; }

      test -n "${INCIDENTOPS_API_URL:-}" ||
        { echo "INCIDENTOPS_API_URL is missing"; exit 1; }

      test -n "${SITE_BUCKET_NAME:-}" ||
        { echo "SITE_BUCKET_NAME is missing"; exit 1; }

      test -n "${CLOUDFRONT_DISTRIBUTION_ID:-}" ||
        { echo "CLOUDFRONT_DISTRIBUTION_ID is missing"; exit 1; }

      export AWS_ROLE_ARN="${AWS_DEPLOY_ROLE_ARN}"
      export AWS_ROLE_SESSION_NAME="GitLab-Frontend-${CI_PROJECT_ID}-${CI_PIPELINE_ID}"
      printf '%s' "${GITLAB_OIDC_TOKEN}" > /tmp/gitlab-oidc-token
      export AWS_WEB_IDENTITY_TOKEN_FILE="/tmp/gitlab-oidc-token"

      aws sts get-caller-identity

      sed \
        "s|__INCIDENTOPS_API_URL__|${INCIDENTOPS_API_URL}|g" \
        frontend/config.template.js > frontend/config.js

      aws s3 sync \
        frontend/ \
        "s3://${SITE_BUCKET_NAME}" \
        --delete \
        --exclude "config.template.js"

      aws cloudfront create-invalidation \
        --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
        --paths "/*"

terraform:destroy:
  stage: destroy
  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]

  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com

  variables:
    TF_IN_AUTOMATION: "true"

  before_script:
    - |
      set -eu

      export TF_HTTP_ADDRESS="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}"
      export TF_HTTP_LOCK_ADDRESS="${TF_HTTP_ADDRESS}/lock"
      export TF_HTTP_UNLOCK_ADDRESS="${TF_HTTP_ADDRESS}/lock"
      export TF_HTTP_USERNAME="gitlab-ci-token"
      export TF_HTTP_PASSWORD="${CI_JOB_TOKEN}"
      export TF_HTTP_LOCK_METHOD="POST"
      export TF_HTTP_UNLOCK_METHOD="DELETE"
      export TF_HTTP_RETRY_WAIT_MIN="5"

      export AWS_ROLE_ARN="${AWS_DEPLOY_ROLE_ARN}"
      export AWS_ROLE_SESSION_NAME="GitLab-Destroy-${CI_PROJECT_ID}-${CI_PIPELINE_ID}"

      printf '%s' "${GITLAB_OIDC_TOKEN}" > /tmp/gitlab-oidc-token
      export AWS_WEB_IDENTITY_TOKEN_FILE="/tmp/gitlab-oidc-token"

      terraform -chdir="${TF_ROOT}" init -reconfigure

  script:
    - |
      if [ "${CONFIRM_DESTROY:-}" != "DESTROY_INCIDENTOPS" ]; then
        echo "Destruction refusée."
        echo "Lance le job avec la variable :"
        echo "CONFIRM_DESTROY=DESTROY_INCIDENTOPS"
        exit 1
      fi

    - terraform -chdir="${TF_ROOT}" plan -destroy -out=destroy.tfplan

    - terraform -chdir="${TF_ROOT}" show -no-color destroy.tfplan

    - terraform -chdir="${TF_ROOT}" apply -auto-approve destroy.tfplan

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: false
    - when: never

  resource_group: incidentops-dev-infrastructure

  environment:
    name: dev
    action: stop